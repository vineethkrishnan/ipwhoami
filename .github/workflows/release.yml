name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PAT }}

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify version matches
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ needs.release-please.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release ($TAG_VERSION)"
            exit 1
          fi

      - name: Smoke test
        run: |
          node bin/ipwho.js --help
          node bin/ipwho.js --version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            vineethkrishnan/ipwho:latest
            vineethkrishnan/ipwho:${{ needs.release-please.outputs.version }}
            ghcr.io/vineethkrishnan/ipwho:latest
            ghcr.io/vineethkrishnan/ipwho:${{ needs.release-please.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-homebrew:
    name: Update Homebrew Formula
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for tarball availability
        run: sleep 10

      - name: Compute SHA256
        id: sha
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          URL="https://github.com/vineethkrishnan/ipwho/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: vineethkrishnan/homebrew-ipwho
          token: ${{ secrets.RELEASE_PAT }}

      - name: Update formula
        run: |
          cat > Formula/ipwho.rb << 'FORMULA'
          class Ipwho < Formula
            desc "IP geolocation lookup from your terminal"
            homepage "https://github.com/vineethkrishnan/ipwho"
            url "${{ steps.sha.outputs.url }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "node" => ">=18"

            def install
              libexec.install "bin", "src", "package.json"
              bin.install_symlink libexec/"bin/ipwho.js" => "ipwho"
            end

            test do
              assert_match "ipwho", shell_output("#{bin}/ipwho --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ipwho.rb
          git commit -m "Update ipwho to ${{ needs.release-please.outputs.version }}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for tarball availability
        run: sleep 10

      - name: Compute SHA256
        id: sha
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          URL="https://github.com/vineethkrishnan/ipwho/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: vineethkrishnan/scoop-ipwho
          token: ${{ secrets.RELEASE_PAT }}

      - name: Write updated manifest
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          cat > ipwho.json << EOF
          {
              "version": "${VERSION}",
              "description": "IP geolocation lookup from your terminal",
              "homepage": "https://github.com/vineethkrishnan/ipwho",
              "license": "MIT",
              "url": "https://github.com/vineethkrishnan/ipwho/archive/refs/tags/v${VERSION}.tar.gz",
              "hash": "${SHA}",
              "depends": "nodejs",
              "extract_dir": "ipwho-${VERSION}",
              "installer": {
                  "script": [
                      "New-Item -ItemType Directory -Force -Path \"\$dir\\\\libexec\" | Out-Null",
                      "Copy-Item -Recurse \"\$dir\\\\bin\" \"\$dir\\\\libexec\\\\bin\"",
                      "Copy-Item -Recurse \"\$dir\\\\src\" \"\$dir\\\\libexec\\\\src\"",
                      "Copy-Item \"\$dir\\\\package.json\" \"\$dir\\\\libexec\\\\package.json\""
                  ]
              },
              "bin": [
                  [
                      "libexec\\\\bin\\\\ipwho.js",
                      "ipwho"
                  ]
              ],
              "checkver": {
                  "github": "https://github.com/vineethkrishnan/ipwho"
              },
              "autoupdate": {
                  "url": "https://github.com/vineethkrishnan/ipwho/archive/refs/tags/v\$version.tar.gz",
                  "extract_dir": "ipwho-\$version"
              }
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ipwho.json
          git commit -m "Update ipwho to ${{ needs.release-please.outputs.version }}"
          git push
